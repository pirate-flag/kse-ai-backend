<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: Arial;
        }

        textarea {
            height: 110px;
            resize: vertical;
        }

        #courses {
            height: 160px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn {
            background: #ef4444;
        }

        .hidden {
            display: none;
        }

        .message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }

        .message.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
        }

        .message.success {
            display: block;
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>

<body>

    <div class="box" id="loginBox">
        <h3>تسجيل الدخول</h3>
        <input id="user" placeholder="username">
        <input id="pass" type="password" placeholder="password">
        <button onclick="login()">دخول</button>
        <div id="loginMessage" class="message"></div>
    </div>

    <div class="box hidden" id="adminBox">
        <h3>لوحة التحكم</h3>

        <label>رابط واتساب</label>
        <input id="whatsapp" placeholder="https://wa.me/96599553161">

        <label>رابط التسجيل</label>
        <input id="register" placeholder="https://www.kse.org.kw">

        <label>رسالة الترحيب</label>
        <input id="welcome" placeholder="أهلاً فيك 👋">

        <label>الأسئلة السريعة / كل سؤال بسطر</label>
        <textarea id="questions" placeholder="شنو الدورات هذا الشهر؟
دورات الكهرباء
دورات المباني"></textarea>

        <label>رفع ملف Excel</label>
        <input type="file" id="excelFile" accept=".xlsx,.xls">

        <label>الدورات / كل دورة تبدأ بـ 📚</label>
        <textarea id="courses" placeholder="📚 دورة الكهرباء
المدة: 5 أيام
المكان: جمعية المهندسين الكويتية

📚 دورة المباني
المدة: 3 أيام
المكان: جمعية المهندسين الكويتية"></textarea>

        <button onclick="saveSettings()">حفظ</button>
        <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
        <div id="adminMessage" class="message"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        let client_id = window.location.pathname.split("/").pop();

        if (!client_id || client_id === "admin") {
            client_id = "kse";
        }

        function showLoginMessage(text, type) {
            const box = document.getElementById("loginMessage");
            box.textContent = text;
            box.className = "message " + type;
        }

        function showAdminMessage(text, type) {
            const box = document.getElementById("adminMessage");
            box.textContent = text;
            box.className = "message " + type;
        }

        function showLoginBox() {
            document.getElementById("loginBox").classList.remove("hidden");
            document.getElementById("adminBox").classList.add("hidden");
        }

        function showAdminBox() {
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("adminBox").classList.remove("hidden");
        }

        async function checkAuthStatus() {
            try {
                const res = await fetch(`/auth-status/${client_id}`, {
                    method: "GET",
                    credentials: "same-origin"
                });

                const data = await res.json();

                if (data.logged_in) {
                    showAdminBox();
                    loadSettings();
                } else {
                    showLoginBox();
                }
            } catch (error) {
                showLoginBox();
            }
        }

        async function login() {
            const u = document.getElementById("user").value.trim();
            const p = document.getElementById("pass").value.trim();

            if (!u || !p) {
                showLoginMessage("اكتب اسم المستخدم وكلمة المرور", "error");
                return;
            }

            try {
                const res = await fetch(`/login/${client_id}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "same-origin",
                    body: JSON.stringify({
                        username: u,
                        password: p
                    })
                });

                const data = await res.json();

                if (res.ok && data.status === "success") {
                    showLoginMessage("", "success");
                    showAdminBox();
                    loadSettings();
                } else {
                    showLoginMessage(data.message || "بيانات غلط", "error");
                }
            } catch (error) {
                showLoginMessage("صار خطأ بالاتصال", "error");
            }
        }

        async function logout() {
            try {
                await fetch(`/logout/${client_id}`, {
                    method: "POST",
                    credentials: "same-origin"
                });
            } catch (error) {
            }

            document.getElementById("user").value = "";
            document.getElementById("pass").value = "";
            showLoginBox();
            showLoginMessage("تم تسجيل الخروج", "success");
        }

        async function saveSettings() {
            const data = {
                whatsapp: document.getElementById("whatsapp").value,
                register: document.getElementById("register").value,
                welcome: document.getElementById("welcome").value,
                questions: document.getElementById("questions").value,
                courses: document.getElementById("courses").value
            };

            try {
                const res = await fetch(`/save-settings/${client_id}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "same-origin",
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    showAdminMessage("تم الحفظ لهذا العميل ✅", "success");
                } else {
                    showAdminMessage(result.message || "غير مصرح", "error");

                    if (res.status === 401) {
                        showLoginBox();
                    }
                }
            } catch (error) {
                showAdminMessage("صار خطأ أثناء الحفظ", "error");
            }
        }

        async function loadSettings() {
            try {
                const res = await fetch(`/get-settings/${client_id}`, {
                    method: "GET",
                    credentials: "same-origin"
                });

                const data = await res.json();

                document.getElementById("whatsapp").value = data.whatsapp || "";
                document.getElementById("register").value = data.register || "";
                document.getElementById("welcome").value = data.welcome || "";
                document.getElementById("questions").value = data.questions || "";
                document.getElementById("courses").value = data.courses || "";
            } catch (error) {
                showAdminMessage("صار خطأ أثناء تحميل الإعدادات", "error");
            }
        }

        document.getElementById("excelFile").addEventListener("change", handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: "array" });

                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);

                let result = "";

                json.forEach(row => {
                    result += "📚 " + (row["اسم الدورة"] || "دورة") + "\n";
                    result += "يبدأ في: " + (row["يبدأ في"] || "") + "\n";
                    result += "ينتهي في: " + (row["ينتهي في"] || "") + "\n";
                    result += "التكلفة: " + (row["التلكلفة للمتدرب"] || row["التكلفة للمتدرب"] || "") + "\n";
                    result += "الوقت: " + (row["وقت الدورة  الفترة الصباحية"] || row["وقت الدورة"] || "") + "\n";
                    result += "عدد المسجلين: " + (row["عدد المسجلين"] || "") + "\n\n";
                });

                document.getElementById("courses").value = result;
            };

            reader.readAsArrayBuffer(file);
        }

        document.getElementById("pass").addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                login();
            }
        });

        checkAuthStatus();
    </script>

</body>

</html>
