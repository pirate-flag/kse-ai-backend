<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KSE AI</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .chat-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .chat-header {
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .chat-box {
            height: 480px;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 14px 16px;
            border-radius: 16px;
            white-space: pre-wrap;
            line-height: 1.8;
        }

        .user {
            align-self: flex-start;
            background: #dbeafe;
        }

        .bot {
            align-self: flex-end;
            background: #ecfdf5;
        }

        .quick-questions {
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quick-btn {
            border: 1px solid #ccc;
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            background: white;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 16px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .send-btn {
            background: #2563eb;
            color: white;
        }

        .clear-btn {
            background: #ef4444;
            color: white;
        }

        .stats-btn {
            background: #0f172a;
            color: white;
        }

        .bottom-actions {
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="chat-card">

            <div class="chat-header">
                <h1>مساعد جمعية المهندسين الكويتية</h1>
                <p>اسأل عن الدورات والتخصصات</p>
            </div>

            <div id="chatBox" class="chat-box"></div>
            <div class="quick-questions" id="quickQuestions"></div>

            <div class="bottom-actions">
                <button class="clear-btn" onclick="clearChat()">مسح المحادثة</button>
                <button class="stats-btn" onclick="showStats()">عرض الإحصائيات</button>
            </div>

            <div class="input-area">
                <input id="q" placeholder="اكتب سؤالك..." />
                <button class="send-btn" onclick="ask()">إرسال</button>
            </div>

        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const input = document.getElementById("q");
        let appSettings = {};

        let client_id = window.location.pathname.split("/").pop();

        if (!client_id || client_id === "" || client_id === "client") {
            client_id = "kse";
        }

        async function loadSettings() {
            try {
                const res = await fetch(`/get-settings/${client_id}`);
                appSettings = await res.json();
            } catch (error) {
                appSettings = {
                    welcome: "أهلاً فيك 👋",
                    questions: ""
                };
            }
        }

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function ask() {
            const q = input.value.trim();
            if (!q) return;

            addMessage(q, "user");
            input.value = "";

            addMessage("جاري البحث...", "bot");

            try {
                const res = await fetch(`/chat/${client_id}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: q })
                });

                const data = await res.json();

                chatBox.removeChild(chatBox.lastChild);

                addMessage(data.reply || "ماكو رد", "bot");

            } catch (err) {
                chatBox.removeChild(chatBox.lastChild);
                addMessage("صار خطأ بالاتصال", "bot");
            }
        }

        function clearChat() {
            chatBox.innerHTML = "";
            addMessage(appSettings.welcome || "أهلاً فيك 👋", "bot");
        }

        function showStats() {
            alert("ميزة الإحصائيات شغالة");
        }

        function loadQuickQuestions() {
            const container = document.getElementById("quickQuestions");
            container.innerHTML = "";

            const data = appSettings.questions;

            const questions = data && data.trim()
                ? data.split("\n").filter(q => q.trim())
                : ["شنو الدورات هذا الشهر؟", "دورات الكهرباء", "دورات المباني"];

            questions.forEach(q => {
                const btn = document.createElement("button");
                btn.className = "quick-btn";
                btn.textContent = q.trim();
                btn.onclick = () => {
                    input.value = q.trim();
                    input.focus();
                };
                container.appendChild(btn);
            });
        }

        input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                ask();
            }
        });

        async function startApp() {
            await loadSettings();
            loadQuickQuestions();
            clearChat();
        }

        startApp();
    </script>

</body>

</html>
